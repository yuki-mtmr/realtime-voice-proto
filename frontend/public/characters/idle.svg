<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="faceGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#FFE4C4"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#E8F4F8"/>

  <!-- Body -->
  <ellipse cx="256" cy="420" rx="120" ry="80" fill="#4A90D9"/>

  <!-- Head -->
  <circle cx="256" cy="200" r="120" fill="url(#faceGrad)"/>

  <!-- Hair -->
  <ellipse cx="256" cy="130" rx="110" ry="60" fill="#8B4513"/>
  <ellipse cx="180" cy="150" rx="30" ry="50" fill="#8B4513"/>
  <ellipse cx="332" cy="150" rx="30" ry="50" fill="#8B4513"/>

  <!-- Eyes -->
  <ellipse cx="210" cy="190" rx="20" ry="25" fill="white"/>
  <ellipse cx="302" cy="190" rx="20" ry="25" fill="white"/>
  <circle cx="210" cy="195" r="10" fill="#4A4A4A"/>
  <circle cx="302" cy="195" r="10" fill="#4A4A4A"/>
  <circle cx="213" cy="192" r="4" fill="white"/>
  <circle cx="305" cy="192" r="4" fill="white"/>

  <!-- Eyebrows -->
  <path d="M185 165 Q210 155 235 165" stroke="#6B4423" stroke-width="4" fill="none"/>
  <path d="M277 165 Q302 155 327 165" stroke="#6B4423" stroke-width="4" fill="none"/>

  <!-- Nose -->
  <ellipse cx="256" cy="230" rx="8" ry="12" fill="#DEB887"/>

  <!-- Mouth (closed/neutral) -->
