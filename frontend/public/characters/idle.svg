  <!-- Blush -->
  <ellipse cx="180" cy="240" rx="20" ry="12" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="332" cy="240" rx="20" ry="12" fill="#FFB6C1" opacity="0.5"/>
</svg>
